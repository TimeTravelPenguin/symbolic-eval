[package]
name = "symbolic-eval"
version = "0.0.1"
compiler = "0.15.0"
entrypoint = "src/lib.typ"
authors = ["TimeTravelPenguin <@TimeTravelPenguin>"]
license = "MIT"
description = "Symbolic expression evaluation powered by Symbolica"
repository = "https://github.com/TimeTravelPenguin/symbolic-eval"
keywords = ["symbolica", "symbolic", "evaluation", "expression", "math", "wasm"]
categories = []

